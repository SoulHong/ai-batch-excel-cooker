<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel AI Cooker (Batch Processing Ver.)</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Helper Functions ---
        const col2num = (col) => {
            let num = 0;
            for (let i = 0; i < col.length; i++) {
                num = num * 26 + (col.charCodeAt(i) - 64);
            }
            return num - 1;
        };

        const num2col = (n) => {
            let s = "";
            n++;
            while (n > 0) {
                let rem = (n - 1) % 26;
                s = String.fromCharCode(65 + rem) + s;
                n = Math.floor((n - 1) / 26);
            }
            return s;
        };

        // Custom Icon components that accept props
        const Icons = {
            FileUp: ({size=24, className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M12 12v6"/><path d="m15 15-3-3-3 3"/></svg>,
            Settings: ({size=24, className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
            Save: ({size=24, className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
            FolderOpen: ({size=24, className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 14 1.45-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.55 6a2 2 0 0 1-1.94 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H18a2 2 0 0 1 2 2v2"/></svg>,
            Play: ({size=24, className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg>,
            Pause: ({size=24, className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>,
            Download: ({size=24, className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>,
            CheckCircle: ({size=24, className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            AlertCircle: ({size=24, className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>,
            Sparkles: ({size=24, className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M9 5H5"/><path d="M5 19v-4"/><path d="M9 19H5"/></svg>,
            Book: ({size=24, className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>,
            Plus: ({size=24, className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Trash: ({size=24, className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            X: ({size=24, className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Pencil: ({size=24, className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>,
            Check: ({size=24, className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        };

        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);
            const bgClass = type === 'error' ? 'bg-red-500' : 'bg-green-500';
            return (
                <div className={`fixed top-4 right-4 ${bgClass} text-white px-6 py-3 rounded-lg shadow-xl z-50 flex items-center gap-2 animate-fade-in`}>
                    {type === 'error' ? <Icons.AlertCircle size={20} /> : <Icons.CheckCircle size={20} />}
                    <span className="font-medium">{message}</span>
                </div>
            );
        };

        const BookmarkModal = ({ isOpen, onClose, bookmarks, onAdd, onUpdate, onDelete, currentPrompt }) => {
            const [newName, setNewName] = useState('');
            const [newPrompt, setNewPrompt] = useState(currentPrompt);
            const [editingId, setEditingId] = useState(null);
            const [editName, setEditName] = useState("");
            const [editPrompt, setEditPrompt] = useState("");

            useEffect(() => {
                if (isOpen) {
                    setNewPrompt(currentPrompt);
                    setNewName('');
                    setEditingId(null);
                }
            }, [isOpen, currentPrompt]);

            if (!isOpen) return null;

            const handleAdd = () => {
                if (!newName.trim()) return;
                onAdd(newName, newPrompt);
                setNewName('');
            };

            const startEditing = (index) => {
                setEditingId(index);
                setEditName(bookmarks[index].name);
                setEditPrompt(bookmarks[index].prompt);
            };

            const saveEditing = (index) => {
                onUpdate(index, editName, editPrompt);
                setEditingId(null);
            };

            const cancelEditing = () => { setEditingId(null); };

            return (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[85vh] animate-fade-in">
                        <div className="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                            <h3 className="font-bold text-gray-800 flex items-center gap-2">
                                <Icons.Book size={20} className="text-indigo-600"/> Manage Bookmarks
                            </h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600"><Icons.X size={20} /></button>
                        </div>
                        <div className="p-4 border-b border-gray-100 bg-indigo-50/30">
                            <label className="block text-xs font-bold text-gray-500 uppercase mb-2">Save New Bookmark</label>
                            <div className="flex gap-2">
                                <input type="text" className="w-1/3 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Bookmark Name" value={newName} onChange={(e) => setNewName(e.target.value)} />
                                <input type="text" className="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 font-mono" placeholder="Prompt content" value={newPrompt} onChange={(e) => setNewPrompt(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleAdd()} />
                                <button onClick={handleAdd} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-1 shrink-0"><Icons.Plus size={16}/> Add</button>
                            </div>
                        </div>
                        <div className="overflow-y-auto p-4 space-y-3 flex-1 bg-gray-50/50">
                            {bookmarks.length === 0 ? (
                                <div className="text-center text-gray-400 py-12 text-sm">No bookmarks yet.<br/>Save your prompts for quick access!</div>
                            ) : (
                                bookmarks.map((bm, idx) => (
                                    <div key={idx} className="bg-white border border-gray-200 rounded-lg p-3 hover:shadow-md transition-shadow">
                                        {editingId === idx ? (
                                            <div className="space-y-3">
                                                <div className="flex justify-between items-center mb-2"><span className="text-xs font-bold text-indigo-600 uppercase">Editing</span></div>
                                                <input type="text" className="w-full border border-gray-300 rounded px-2 py-1.5 text-sm font-semibold mb-2" value={editName} onChange={(e) => setEditName(e.target.value)} placeholder="Name" />
                                                <textarea className="w-full border border-gray-300 rounded px-2 py-1.5 text-xs font-mono h-20 resize-none" value={editPrompt} onChange={(e) => setEditPrompt(e.target.value)} placeholder="Prompt" />
                                                <div className="flex gap-2 justify-end">
                                                    <button onClick={cancelEditing} className="px-3 py-1.5 text-xs text-gray-600 hover:bg-gray-100 rounded">Cancel</button>
                                                    <button onClick={() => saveEditing(idx)} className="px-3 py-1.5 text-xs bg-indigo-600 text-white rounded hover:bg-indigo-700 flex items-center gap-1"><Icons.Check size={14}/> Save</button>
                                                </div>
                                            </div>
                                        ) : (
                                            <div>
                                                <div className="flex justify-between items-start mb-2">
                                                    <span className="font-semibold text-gray-800 text-sm">{bm.name}</span>
                                                    <div className="flex gap-1">
                                                        <button onClick={() => startEditing(idx)} className="p-1.5 text-gray-500 hover:bg-gray-100 hover:text-indigo-600 rounded-md transition-colors"><Icons.Pencil size={14} /></button>
                                                        <button onClick={() => onDelete(idx)} className="p-1.5 text-gray-400 hover:bg-red-50 hover:text-red-500 rounded-md transition-colors"><Icons.Trash size={14} /></button>
                                                    </div>
                                                </div>
                                                <p className="text-xs text-gray-500 line-clamp-2 bg-gray-50 p-2 rounded border border-gray-100 font-mono">{bm.prompt}</p>
                                            </div>
                                        )}
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const ExcelCooker = () => {
            const [apiKey, setApiKey] = useState('');
            const fileInputRef = useRef(null);
            const [file, setFile] = useState(null);
            const [fileName, setFileName] = useState('');
            const [data, setData] = useState([]);
            const [columns, setColumns] = useState([]);
            
            // Fixed unescaped quotes in the default prompt
            const [config, setConfig] = useState({
                model: 'gemini-3-flash-preview',
                batchSize: 100,
                outputCol: 'D',
                prompt: "영어 어휘 {A}, 의미 {B}가 서로 통하고, 맞춤법에 이상 있는지, 그리고 예문 '{C}'에도 품사와 의미가 맞게 들어갔는지 확인 후 문제 없는 경우 'O' 표시하세요. 하나라도 문제가 있을 경우 'X' 하세요. 부가설명 없이 O/X만을 출력합니다.",
            });
            const [bookmarks, setBookmarks] = useState([]);
            const [isBookmarkModalOpen, setIsBookmarkModalOpen] = useState(false);

            const [processing, setProcessing] = useState(false);
            const [progress, setProgress] = useState(0);
            const [logs, setLogs] = useState([]);
            const [previewResult, setPreviewResult] = useState(null);
            const [toast, setToast] = useState(null);

            const stopSignalRef = useRef(false);

            // API Handler
            const callGemini = async (promptText) => {
                const API_KEY = apiKey || "";
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${config.model}:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                    });
                    
                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.error?.message || 'API request failed');
                    }
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text || "No response";
                } catch (error) {
                    return `Error: ${error.message}`;
                }
            };

            const handleFileUpload = (e) => {
                const selectedFile = e.target.files[0];
                if (!selectedFile) return;
                setFileName(selectedFile.name);
                setFile(selectedFile);
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const data = new Uint8Array(evt.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const wsname = wb.SheetNames[0];
                    const ws = wb.Sheets[wsname];
                    const jsonData = XLSX.utils.sheet_to_json(ws, { header: 1 });
                    setData(jsonData);
                    
                    let maxCols = 0;
                    jsonData.slice(0, 10).forEach(row => { if (row.length > maxCols) maxCols = row.length; });
                    const cols = Array.from({ length: Math.max(maxCols, 26) }, (_, i) => num2col(i));
                    setColumns(cols);
                };
                reader.readAsArrayBuffer(selectedFile);
            };

            const getBatchPrompt = (batchData) => {
                let itemLines = batchData.map((row, i) => {
                    let p = config.prompt;
                    const rowText = p.replace(/\{([A-Za-z]+)\}/g, (match, col) => {
                        const idx = col2num(col.toUpperCase());
                        return (row[idx] !== undefined && row[idx] !== null) ? row[idx] : "";
                    });
                    return `Item ${i + 1}: ${rowText}`;
                }).join("\n");

                return `Process the following ${batchData.length} items.
For each item, strictly follow the instructions.
Output ONLY your final result for each item, with each result on a new line. 
Do NOT include item numbers, bullet points, preamble, or any extra text.
Your output MUST contain exactly ${batchData.length} lines.

${itemLines}`;
            };

            const runTest = async () => {
                if (!apiKey) return setToast({ msg: 'Please enter your Gemini API Key first.', type: 'error' });
                if (data.length === 0) return setToast({ msg: 'Please load a file first.', type: 'error' });
                
                setPreviewResult("Generating test batch...");
                const batchSize = Math.min(config.batchSize || 10, data.length);
                const batchData = data.slice(0, batchSize);
                
                const prompt = getBatchPrompt(batchData);
                const result = await callGemini(prompt);
                setPreviewResult(result);
            };

            const handleSaveSettings = () => {
                const settings = JSON.stringify({ ...config, bookmarks }, null, 2);
                const blob = new Blob([settings], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'excel_cooker_settings.json';
                a.click();
                URL.revokeObjectURL(url);
                setToast({ msg: 'Settings & Bookmarks saved!', type: 'success' });
            };

            const handleLoadSettings = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const loadedConfig = JSON.parse(e.target.result);
                        if (loadedConfig.prompt) {
                            const { bookmarks: loadedBookmarks, ...restConfig } = loadedConfig;
                            setConfig(prev => ({ ...prev, ...restConfig }));
                            if (loadedBookmarks && Array.isArray(loadedBookmarks)) setBookmarks(loadedBookmarks);
                            setToast({ msg: 'Settings loaded successfully!', type: 'success' });
                        } else {
                            throw new Error('Invalid settings format');
                        }
                    } catch (err) {
                        setToast({ msg: 'Failed to load settings: ' + err.message, type: 'error' });
                    }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            const handleAddBookmark = (name, prompt) => { setBookmarks([...bookmarks, { name, prompt }]); setToast({ msg: 'Bookmark added!', type: 'success' }); };
            const handleUpdateBookmark = (index, name, prompt) => { const newBm = [...bookmarks]; newBm[index] = { name, prompt }; setBookmarks(newBm); setToast({ msg: 'Bookmark updated!', type: 'success' }); };
            const handleDeleteBookmark = (index) => { const newBm = [...bookmarks]; newBm.splice(index, 1); setBookmarks(newBm); };

            const stopProcessing = () => { stopSignalRef.current = true; };

            const startProcessing = async () => {
                if (!apiKey) return setToast({ msg: 'Missing API Key.', type: 'error' });
                if (data.length === 0) return setToast({ msg: 'No data loaded.', type: 'error' });
                
                stopSignalRef.current = false;
                setProcessing(true);
                setProgress(0);
                setLogs([]);

                const outputIdx = col2num(config.outputCol.toUpperCase());
                const newData = [...data];
                const total = newData.length;
                const batchSize = config.batchSize || 10;

                for (let i = 0; i < total; i += batchSize) {
                    if (stopSignalRef.current) {
                        setLogs(prev => [`Stopped at row ${i}`, ...prev].slice(0, 5));
                        break; 
                    }

                    const endIdx = Math.min(i + batchSize, total);
                    const currentBatch = newData.slice(i, endIdx);
                    const prompt = getBatchPrompt(currentBatch);
                    
                    try {
                        const rawResult = await callGemini(prompt);
                        const results = rawResult.split('\n').filter(line => line.trim() !== "");
                        
                        // Map results back to rows
                        for(let j = 0; j < currentBatch.length; j++) {
                            const rowIndex = i + j;
                            if (!newData[rowIndex]) newData[rowIndex] = [];
                            while (newData[rowIndex].length <= outputIdx) newData[rowIndex].push(null);
                            
                            // If AI returned fewer lines than requested, handle it
                            newData[rowIndex][outputIdx] = results[j] ? results[j].trim() : "AI Skip";
                        }
                        
                        setLogs(prev => [`Batch ${Math.floor(i/batchSize) + 1} (Rows ${i+1}-${endIdx}): Success`, ...prev].slice(0, 5));
                    } catch (e) {
                        setLogs(prev => [`Batch ${Math.floor(i/batchSize) + 1}: Failed - ${e.message}`, ...prev].slice(0, 5));
                    }

                    setProgress(Math.round((endIdx / total) * 100));
                    setData([...newData]);

                    // Small delay to respect rate limits
                    await new Promise(r => setTimeout(r, 500));
                }

                setProcessing(false);
                if (!stopSignalRef.current) {
                    setToast({ msg: 'Processing complete!', type: 'success' });
                }
            };

            const downloadResult = () => {
                const ws = XLSX.utils.aoa_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Processed");
                const newName = fileName ? fileName.replace(/(\.[\w\d_-]+)$/i, '_cooked$1') : 'cooked_data.xlsx';
                XLSX.writeFile(wb, newName);
            };

            return (
                <div className="min-h-screen pb-32">
                    {toast && <Toast message={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
                    <BookmarkModal 
                        isOpen={isBookmarkModalOpen}
                        onClose={() => setIsBookmarkModalOpen(false)}
                        bookmarks={bookmarks}
                        onAdd={handleAddBookmark}
                        onUpdate={handleUpdateBookmark}
                        onDelete={handleDeleteBookmark}
                        currentPrompt={config.prompt}
                    />

                    <header className="bg-white shadow-sm sticky top-0 z-30">
                        <div className="max-w-6xl mx-auto px-6 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-indigo-600 p-2 rounded-lg text-white"><Icons.Sparkles size={24} /></div>
                                <h1 className="text-xl font-bold text-gray-800 tracking-tight">Excel AI Batch Cooker</h1>
                            </div>
                            <div className="flex items-center gap-4 w-full md:w-auto">
                                <input type="password" placeholder="Gemini API Key" className="border border-gray-300 rounded-md px-4 py-2 text-sm flex-1 md:w-64 focus:outline-none focus:ring-2 focus:ring-indigo-500" value={apiKey} onChange={(e) => setApiKey(e.target.value)} />
                                <a href="https://aistudio.google.com/app/apikey" target="_blank" className="text-xs text-indigo-600 hover:underline shrink-0">Get Key</a>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-6 py-8 space-y-8">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div className="col-span-1 bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex flex-col">
                                <h2 className="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2"><Icons.FileUp size={20} className="text-indigo-500"/> 1. Upload File</h2>
                                <div className="border-2 border-dashed border-gray-300 rounded-lg flex-1 flex flex-col items-center justify-center p-6 text-center hover:bg-gray-50 transition-colors relative min-h-[150px]">
                                    <input type="file" accept=".xlsx, .csv, .xls" onChange={handleFileUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                    <div className="bg-indigo-50 p-4 rounded-full mb-3 text-indigo-600"><Icons.FileUp size={24} /></div>
                                    <p className="text-sm font-medium text-gray-700">{fileName ? fileName : "Drag & drop or click"}</p>
                                    <p className="text-xs text-gray-500 mt-1">.xlsx, .csv supported</p>
                                </div>
                            </div>

                            <div className="col-span-1 md:col-span-2 bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-lg font-semibold text-gray-800 flex items-center gap-2"><Icons.Settings size={20} className="text-indigo-500"/> 2. Configuration</h2>
                                    <div className="flex gap-2">
                                        <input type="file" ref={fileInputRef} onChange={handleLoadSettings} className="hidden" accept=".json" />
                                        <button onClick={() => fileInputRef.current.click()} className="text-xs flex items-center gap-1.5 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 px-3 py-1.5 rounded-md transition-colors"><Icons.FolderOpen size={14} /> Load</button>
                                        <button onClick={handleSaveSettings} className="text-xs flex items-center gap-1.5 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 px-3 py-1.5 rounded-md transition-colors"><Icons.Save size={14} /> Save</button>
                                    </div>
                                </div>
                                
                                <div className="space-y-4">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div>
                                            <label className="block text-xs font-semibold text-gray-500 uppercase mb-1">AI Model</label>
                                            <select className="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-700 focus:outline-none" value={config.model} onChange={(e) => setConfig({...config, model: e.target.value})}>
                                                <option value="gemini-3-flash-preview">Gemini 3 Flash</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-gray-500 uppercase mb-1">Batch Size</label>
                                            <input type="number" min="1" max="50" className="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm text-center font-mono" value={config.batchSize} onChange={(e) => setConfig({...config, batchSize: parseInt(e.target.value) || 1})} />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-gray-500 uppercase mb-1">Output Column</label>
                                            <input type="text" className="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm text-center uppercase font-mono" value={config.outputCol} onChange={(e) => setConfig({...config, outputCol: e.target.value.toUpperCase()})} maxLength={2} />
                                        </div>
                                    </div>

                                    <div>
                                        <div className="flex justify-between items-end mb-2">
                                            <div className="flex items-center gap-2">
                                                <label className="block text-xs font-semibold text-gray-500 uppercase">Prompt Template</label>
                                                <span className="text-[10px] text-gray-400">Use {`{A}`}, {`{B}`} for columns.</span>
                                            </div>
                                            <button onClick={() => setIsBookmarkModalOpen(true)} className="text-xs flex items-center gap-1 bg-white text-gray-600 px-2 py-1 rounded-md border border-gray-200"><Icons.Settings size={12}/> Manage</button>
                                        </div>
                                        
                                        <div className="flex flex-wrap gap-2 mb-2 max-h-24 overflow-y-auto">
                                            {bookmarks.map((bm, idx) => {
                                                const isActive = config.prompt === bm.prompt;
                                                return (
                                                    <button key={idx} onClick={() => setConfig({...config, prompt: bm.prompt})} className={`px-3 py-1 text-xs rounded-full border transition-colors flex items-center gap-1 ${isActive ? 'bg-indigo-600 text-white' : 'bg-white text-gray-600 hover:border-indigo-400'}`}>{isActive && <Icons.Check size={10} />}{bm.name}</button>
                                                );
                                            })}
                                        </div>

                                        <textarea className="w-full h-24 bg-gray-50 border border-gray-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none font-mono" value={config.prompt} onChange={(e) => setConfig({...config, prompt: e.target.value})}></textarea>
                                    </div>

                                    <div className="flex justify-end">
                                        <button onClick={runTest} disabled={!data.length} className="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm font-medium disabled:opacity-50">Test Batch Output</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Preview Section */}
                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                             <div className="p-4 border-b border-gray-100 flex flex-col md:flex-row justify-between items-start bg-gray-50 gap-4">
                                <h2 className="text-sm font-semibold text-gray-700">Data Preview (First 10 Rows)</h2>
                                {previewResult && (
                                    <div className="text-xs flex flex-col gap-1 w-full md:w-1/2">
                                        <span className="font-semibold text-indigo-600">Batch Response Preview:</span>
                                        <div className="bg-indigo-100 text-indigo-900 px-3 py-2 rounded max-h-32 overflow-y-auto whitespace-pre-wrap font-mono shadow-inner text-[11px] leading-relaxed border border-indigo-200">
                                            {previewResult}
                                        </div>
                                    </div>
                                )}
                            </div>
                            
                            <div className="overflow-x-auto">
                                <table className="w-full text-sm text-left text-gray-500">
                                    <thead className="text-xs text-gray-700 uppercase bg-gray-100 border-b">
                                        <tr>
                                            <th className="px-4 py-3 w-10 text-center bg-gray-200">#</th>
                                            {columns.slice(0, 10).map((col) => (
                                                <th key={col} className={`px-4 py-3 border-r min-w-[100px] ${col === config.outputCol ? 'bg-indigo-100 text-indigo-800' : ''}`}>{col}</th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {data.slice(0, 10).map((row, rIdx) => (
                                            <tr key={rIdx} className="bg-white border-b hover:bg-gray-50">
                                                <td className="px-4 py-3 text-center font-mono text-xs bg-gray-50 border-r">{rIdx + 1}</td>
                                                {columns.slice(0, 10).map((col, cIdx) => {
                                                    const colNum = col2num(col);
                                                    const val = row[colNum];
                                                    return (
                                                        <td key={cIdx} className={`px-4 py-2 border-r max-w-[200px] align-top ${col === config.outputCol ? 'bg-indigo-50/30' : ''}`}>
                                                            <div className="truncate text-xs">{(val !== undefined && val !== null) ? String(val) : ""}</div>
                                                        </td>
                                                    );
                                                })}
                                            </tr>
                                        ))}
                                        {data.length === 0 && <tr><td colSpan="12" className="px-6 py-12 text-center text-gray-400 italic">No file loaded yet.</td></tr>}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* Sticky Action Bar */}
                        <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] z-40">
                            <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center gap-6">
                                <div className="flex-1 w-full">
                                    {processing ? (
                                        <div className="space-y-2">
                                            <div className="flex justify-between text-xs font-medium text-gray-600">
                                                <span>Cooking... {progress}%</span>
                                                <span className="truncate max-w-[200px]">{logs[0] || 'Preparing...'}</span>
                                            </div>
                                            <div className="w-full bg-gray-200 rounded-full h-2.5">
                                                <div className="bg-indigo-600 h-2.5 rounded-full transition-all duration-300" style={{width: `${progress}%`}}></div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="text-sm text-gray-600">
                                            {data.length > 0 ? <span>Loaded <strong>{data.length}</strong> rows. Batch size: {config.batchSize}.</span> : <span>Upload a file to start batch processing.</span>}
                                        </div>
                                    )}
                                </div>

                                <div className="flex gap-3 w-full md:w-auto">
                                    {processing ? (
                                        <button onClick={stopProcessing} className="flex-1 md:flex-none flex items-center justify-center gap-2 px-6 py-3 bg-red-500 hover:bg-red-600 text-white rounded-xl font-semibold shadow-lg shadow-red-100 transition-all">
                                            <Icons.Pause size={20} /> Stop
                                        </button>
                                    ) : (
                                        <button onClick={startProcessing} disabled={!data.length || !apiKey} className={`flex-1 md:flex-none flex items-center justify-center gap-2 px-8 py-3 rounded-xl text-white font-semibold shadow-lg transition-all ${!data.length || !apiKey ? 'bg-gray-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700 shadow-indigo-100'}`}>
                                            <Icons.Play size={20} /> Start Cooking
                                        </button>
                                    )}

                                    <button onClick={downloadResult} disabled={processing || !data.length} className="flex-1 md:flex-none flex items-center justify-center gap-2 px-6 py-3 bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl font-semibold shadow-lg shadow-emerald-100 transition-all disabled:opacity-50">
                                        <Icons.Download size={20} /> Download
                                    </button>
                                </div>
                            </div>
                        </div>

                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ExcelCooker />);
    </script>
</body>
</html>
